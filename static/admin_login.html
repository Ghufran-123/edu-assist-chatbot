<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EDU Assist — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@600;700&family=Satoshi:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --ink: #080910;
            --ink2: #0e0f18;
            --ink3: #151621;
            --ink4: #1d1e2e;
            --line: rgba(255, 255, 255, 0.06);
            --line2: rgba(255, 255, 255, 0.1);
            --v: #7c6bff;
            --v2: #a78bfa;
            --v-dim: rgba(124, 107, 255, 0.12);
            --v-glow: rgba(124, 107, 255, 0.35);
            --v-b: rgba(124, 107, 255, 0.25);
            --go: #22d3a0;
            --bad: #f43f5e;
            --bad-dim: rgba(244, 63, 94, 0.12);
            --t1: #f0f0f8;
            --t2: #8888aa;
            --t3: #555570;
            --display: 'Clash Display', sans-serif;
            --body: 'Satoshi', sans-serif;
            --mono: 'DM Mono', monospace;
        }

        html,
        body {
            height: 100%;
            background: var(--ink);
            color: var(--t1);
            font-family: var(--body);
            overflow: hidden;
        }

        /* ── Animated background ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124, 107, 255, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(167, 139, 250, 0.05) 0%, transparent 60%),
                var(--ink);
        }

        /* Animated grid lines */
        .grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(124, 107, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 107, 255, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(48px)
            }
        }

        /* Noise texture */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(124, 107, 255, 0.15), transparent 70%);
            animation-delay: 0s;
        }

        .orb2 {
            width: 300px;
            height: 300px;
            bottom: -80px;
            right: -80px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.1), transparent 70%);
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1)
            }

            50% {
                transform: translateY(-30px) scale(1.05)
            }
        }

        /* ── Main layout ── */
        .wrap {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--ink2);
            border: 1px solid var(--line2);
            border-radius: 24px;
            padding: 40px 36px 36px;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(24px);
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* Top glow line */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--v), var(--v2), transparent);
            opacity: 0.8;
        }

        /* Corner accent */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at top right, rgba(124, 107, 255, 0.08), transparent 70%);
        }

        /* ── Logo ── */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--v), var(--v2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 0 24px var(--v-glow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 24px var(--v-glow)
            }

            50% {
                box-shadow: 0 0 36px rgba(124, 107, 255, 0.5)
            }
        }

        .logo-text {
            font-family: var(--display);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .logo-text em {
            color: var(--v);
            font-style: normal;
            opacity: 0.85
        }

        /* ── Heading ── */
        .heading {
            font-family: var(--display);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .subheading {
            font-size: 13.5px;
            color: var(--t3);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* ── Form ── */
        .field {
            margin-bottom: 16px
        }

        .field-label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            pointer-events: none;
            opacity: 0.5;
        }

        .input {
            width: 100%;
            background: var(--ink3);
            border: 1px solid var(--line2);
            border-radius: 10px;
            padding: 11px 14px 11px 40px;
            font-family: var(--body);
            font-size: 14px;
            color: var(--t1);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .input::placeholder {
            color: var(--t3)
        }

        .input:focus {
            border-color: var(--v);
            box-shadow: 0 0 0 3px rgba(124, 107, 255, 0.12);
            background: var(--ink4);
        }

        .input.err {
            border-color: var(--bad);
            box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.1);
        }

        /* Password toggle */
        .pass-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--t3);
            font-size: 15px;
            transition: color 0.15s;
            padding: 4px;
        }

        .pass-toggle:hover {
            color: var(--t1)
        }

        /* ── Error message ── */
        .error-msg {
            display: none;
            background: var(--bad-dim);
            border: 1px solid rgba(244, 63, 94, 0.25);
            border-radius: 9px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--bad);
            margin-bottom: 16px;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease;
        }

        .error-msg.show {
            display: flex
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20%,
            60% {
                transform: translateX(-6px)
            }

            40%,
            80% {
                transform: translateX(6px)
            }
        }

        /* ── Submit button ── */
        .btn {
            width: 100%;
            background: var(--v);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: var(--body);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px var(--v-glow);
        }

        .btn:hover::before {
            opacity: 1
        }

        .btn:active {
            transform: translateY(0)
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading spinner inside button */
        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .btn.loading .spinner {
            display: block
        }

        .btn.loading .btn-text::after {
            content: '…'
        }

        /* ── Footer ── */
        .footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--t3);
            font-family: var(--mono);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--go);
            box-shadow: 0 0 6px var(--go);
            animation: blink 2.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .footer-version {
            font-size: 11px;
            color: var(--t3);
            font-family: var(--mono);
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="grid"></div>
    <div class="noise"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="wrap">
        <div class="card">

            <div class="logo">
                <div class="logo-mark">🎓</div>
                <div class="logo-text">EDU<em>Assist</em></div>
            </div>

            <div class="heading">Admin Portal</div>
            <div class="subheading">Sign in with your admin credentials to access the dashboard.</div>

            <div class="error-msg" id="errorMsg">
                <span>⚠</span>
                <span id="errorText">Invalid username or password.</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="field">
                    <label class="field-label" for="username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">◎</span>
                        <input class="input" id="username" type="text" placeholder="admin" autocomplete="username"
                            spellcheck="false" />
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔑</span>
                        <input class="input" id="password" type="password" placeholder="••••••••••••"
                            autocomplete="current-password" />
                        <button type="button" class="pass-toggle" onclick="togglePass()" id="passToggle">👁</button>
                    </div>
                </div>

                <button class="btn" type="submit" id="loginBtn">
                    <div class="btn-inner">
                        <div class="spinner"></div>
                        <span class="btn-text">Sign in to Dashboard</span>
                    </div>
                </button>
            </form>

            <div class="footer">
                <div class="footer-badge">
                    <div class="status-dot"></div>
                    KIET University · System Online
                </div>
                <div class="footer-version">v7.0.0</div>
            </div>

        </div>
    </div>

    <script>
        function togglePass() {
            const inp = document.getElementById('password');
            const btn = document.getElementById('passToggle');
            if (inp.type === 'password') {
                inp.type = 'text';
                btn.textContent = '🙈';
            } else {
                inp.type = 'password';
                btn.textContent = '👁';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = msg;
            el.classList.add('show');
            document.getElementById('username').classList.add('err');
            document.getElementById('password').classList.add('err');
            // Re-trigger shake animation
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = '';
        }

        function clearError() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('username').classList.remove('err');
            document.getElementById('password').classList.remove('err');
        }

        async function handleLogin(e) {
            e.preventDefault();
            clearError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            // Show loading state
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',   // include session cookie
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // Store the token in sessionStorage for API calls
                    sessionStorage.setItem('admin_token', data.token);
                    // Redirect to dashboard
                    window.location.href = '/admin';
                } else {
                    showError(data.detail || 'Invalid username or password.');
                }
            } catch (err) {
                showError('Cannot reach server. Make sure the server is running.');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Auto-focus username field
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
        });

        // Enter key on username moves to password
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('password').focus();
                }
            });
        });
    </script>
</body>

</html>
